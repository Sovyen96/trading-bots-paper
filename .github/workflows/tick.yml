name: paper-trading-tick

on:
  schedule:
    - cron: "4 * * * *"   # cada hora, minuto 4 (tras el cierre de la vela 1h)
  workflow_dispatch:        # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar tick de paper trading
        run: python tick.py

      - name: Guardar estado en el repositorio
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/live_state.json docs/state.json
          git diff --cached --quiet || git commit -m "tick $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
